version: "3.8"

services:
  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    container_name: snapshop-db
    restart: always
    environment:
      POSTGRES_DB: snapshop
      POSTGRES_USER: snapshop
      POSTGRES_PASSWORD: snapshop123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U snapshop" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==================== Backend API ====================
  api:
    build:
      context: ./snapshop-api
      dockerfile: Dockerfile
    container_name: snapshop-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://snapshop:snapshop123@postgres:5432/snapshop?sslmode=disable"
      JWT_SECRET: "snapshop-jwt-secret-production-2026"
    depends_on:
      postgres:
        condition: service_healthy

  # ==================== Admin Dashboard ====================
  admin:
    build:
      context: ./snapshop-admin
      dockerfile: Dockerfile
    container_name: snapshop-admin
    restart: always
    ports:
      - "5174:80"
    depends_on:
      - api

volumes:
  postgres_data:
